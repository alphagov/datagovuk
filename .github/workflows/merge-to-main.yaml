name: Merge to main

on:
  push:
    branches: ['main']
    paths-ignore: ['docs/**']

jobs:
    ci:
        uses: ./.github/workflows/ci.yml
        permissions:
            contents: read

    trivy-scan:
        uses: ./.github/workflows/trivy-scans.yaml
        needs: ci

    build-image:
        uses: ./.github/workflows/build-image.yaml
        permissions:
            contents: read
            packages: write
            id-token: write
        needs: trivy-scan
        with:
            buildType: build_push
            gitRef: ${{ github.sha }}

    create-integration-pr:
        uses: ./.github/workflows/create-integration-pr.yaml
        needs: build-image
        with:
            gitRef: ${{ github.ref_name }}
        secrets: inherit

    notify_slack_on_failure:
        name: Notify Slack on failure
        if: ${{ always() && failure() }}
        needs: [ci, trivy-scan, build-image, create-integration-pr]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/notify-slack
              with:
                  slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
                  channel: datagovuk-technical
                  status: failure
                  message: Merge to main workflow failed
