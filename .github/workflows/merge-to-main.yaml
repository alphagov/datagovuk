name: Merge to main

on:
  push:
    paths-ignore: ['docs/**']
    branches: ['test-DGUK-583-add-slack-notifications-cicd']

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  trivy-scan:
    uses: ./.github/workflows/trivy-scans.yaml
    needs: ci

  build-image:
    uses: ./.github/workflows/build-image.yaml
    permissions:
      contents: read
      packages: write
      id-token: write
    needs: trivy-scan
    with:
      buildType: build_push
      gitRef: ${{ github.sha }}

  create-integration-pr:
    uses: ./.github/workflows/create-integration-pr.yaml
    needs: build-image
    with:
      gitRef: ${{ github.ref_name }}
    secrets: inherit
  
  test-failure:
    name: Test failure step for Slack notifications
    runs-on: ubuntu-latest
    steps:
      - name: Simulate failure
        run: exit 1
  notify-slack-if-failure-on-main:
    runs-on: ubuntu-latest
    needs:
      - ci
      - test-failure
      - trivy-scan
      - build-image
      - create-integration-pr
    steps:
      - run: echo "Workflow failed on main branch. Sending notification to Slack..."
      - name: Notify Slack if failure on main
        if: ${{ failure() }}
        uses: alphagov/govuk-infrastructure/.github/actions/report-run-failure@main
        with:
          slack_webhook_url: ${{ secrets.GOVUK_SLACK_WEBHOOK_URL }}
          channel: datagovuk-technical