name: Merge to main

on:
  pull_request:
    paths-ignore: ['docs/**']
    types: [opened, synchronize]


jobs:
    ci:
        uses: ./.github/workflows/ci.yaml

    trivy-scan:
        uses: ./.github/workflows/trivy-scans.yaml
        needs: ci

    build-image:
        uses: ./.github/workflows/build-image.yaml
        needs: trivy-scan
        with:
            buildType: build_only
            gitRef: ${{ github.sha }}

    create-integration-pr:
        uses: ./.github/workflows/create-integration-pr.yaml
        needs: build-image
        with:
            gitRef: ${{ github.ref_name }}
        secrets: inherit
