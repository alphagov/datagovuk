name: Smoke Tests

on:
  workflow_call:
    inputs:
      environment:
        description: 'The environment to run tests against; staging or integration'
        required: true
        type: string
      expected_sha:
        description: 'Expected sha on running instance to test'
        required: false
        type: string
    secrets:
      E2E_BASIC_AUTH_USERNAME:
        required: true
      E2E_BASIC_AUTH_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      expected_sha:
        description: 'Expected sha on running instance to test'
        required: false
        type: string
      environment:
        description: 'The environment to run tests against; staging or integration'
        required: true
        type: string

env:
  BASE_URL: ${{ format('https://find.eks.{0}.govuk.digital', inputs.environment) }}
  EXPECTED_SHA: ${{ inputs.expected_sha || '' }}
  E2E_BASIC_AUTH_USERNAME: ${{ secrets.E2E_BASIC_AUTH_USERNAME || secrets[format('E2E_BASIC_AUTH_USERNAME_{0}', inputs.environment)] }}
  E2E_BASIC_AUTH_PASSWORD: ${{ secrets.E2E_BASIC_AUTH_PASSWORD || secrets[format('E2E_BASIC_AUTH_PASSWORD_{0}', inputs.environment)] }}

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build and cache local backend
        uses: docker/bake-action@v7.3.0
        with:
          push: false
          load: true
          files: docker-compose.local.yml
          targets: django
          set: |
            django.cache-from=type=gha,scope=django-${{ github.ref_name }}
            django.cache-from=type=gha,scope=django-main
            django.cache-to=type=gha,scope=django-${{ github.ref_name }},mode=max

      - name: Wait for datagovuk deployment SHA
        if: env.EXPECTED_SHA != ''
        run: |
          NEXT_WAIT_TIME=0
          UNTIL_MAX=20 # Maximum number of attempts
          SLEEP_TIME=10 # Seconds between polls

          until [ $NEXT_WAIT_TIME -eq $UNTIL_MAX ] || [ "$(curl -s ${{ env.BASE_URL }}/version/)" == "${{ env.EXPECTED_SHA }}" ]; do
            echo "Waiting for datagovuk deployment to be ready - expecting sha '${{ env.EXPECTED_SHA }}'..."
            sleep $SLEEP_TIME
            NEXT_WAIT_TIME=$((NEXT_WAIT_TIME+1))
          done

          if [ $NEXT_WAIT_TIME -eq $UNTIL_MAX ]; then
            echo "Timeout reached waiting for datagovuk deployment!"
            exit 1
          fi

      - name: Run E2E smoke tests
        run: |
          docker compose -f docker-compose.local.yml up -d
          # --override-ini suppresses --ds=config.settings.test and --reuse-db from the default
          # addopts in pyproject.toml; no local Django instance is needed when BASE_URL is set.
          docker compose -f docker-compose.local.yml exec \
            -e BASE_URL=${{ env.BASE_URL }} \
            -e E2E_BASIC_AUTH_USERNAME=${{ env.E2E_BASIC_AUTH_USERNAME }} \
            -e E2E_BASIC_AUTH_PASSWORD=${{ env.E2E_BASIC_AUTH_PASSWORD }} \
            django pytest -m smoke tests/e2e/ --override-ini="addopts=--import-mode=importlib"

      - name: Upload E2E failure traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-traces
          path: e2e-failure-traces

      - name: Verify datagovuk deployment SHA unchanged
        if: env.EXPECTED_SHA != ''
        run: |
          if [ "$(curl -s ${{ env.BASE_URL }}/version/)" != "${{ env.EXPECTED_SHA }}" ]; then
            echo "Deployment sha for datagovuk changed during smoke test run!"
            exit 1
          fi

      - name: Tear down the Stack
        if: always()
        run: docker compose -f docker-compose.local.yml down
