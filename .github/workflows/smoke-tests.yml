name: Smoke Tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch name or git tag to check out'
        default: 'main'
        required: false
        type: string
      base_url:
        description: 'Root URL of the running instance to test (e.g. https://staging.data.gov.uk)'
        required: true
        type: string

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  BASE_URL: ${{ github.event.inputs.base_url || 'https://datagovuk.eks.integration.govuk.digital' }}

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Copy env file
        run: cp .envs/.local/.django.example .envs/.local/.django

      - name: Build and cache local backend
        uses: docker/bake-action@v7
        with:
          push: false
          load: true
          files: docker-compose.local.yml
          targets: django
          set: |
            django.cache-from=type=gha,scope=django-${{ inputs.ref }}
            django.cache-from=type=gha,scope=django-main
            django.cache-to=type=gha,scope=django-${{ inputs.ref }},mode=max

      - name: Run E2E smoke tests
        run: |
          docker compose -f docker-compose.local.yml up -d
          # --override-ini suppresses --ds=config.settings.test and --reuse-db from the default
          # addopts in pyproject.toml; no local Django instance is needed when BASE_URL is set.
          docker compose -f docker-compose.local.yml exec \
            -e BASE_URL=${{ env.BASE_URL }} \
            django pytest -m smoke tests/e2e/ --override-ini="addopts=--import-mode=importlib"

      - name: Upload E2E failure traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-traces
          path: e2e-failure-traces

      - name: Tear down the Stack
        if: always()
        run: docker compose -f docker-compose.local.yml down
