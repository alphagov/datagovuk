name: Notify Slack on main workflow failures

on:
  # TODO: Remove this workflow_dispatch trigger after testing (36b7ea138e77645a26211a2953b30fe996f94dcd)
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build and push multi-arch images
      - CI
      - CodeQL
      - Trivy Security Scan
      - Tag datagovuk image for staging and production
      - Create deployment PRs on release tags creation
      - Create integration PR
    types:
      - completed

jobs:
  notify-slack:
    # TODO: Remove this workflow_dispatch condition after testing (36b7ea138e77645a26211a2953b30fe996f94dcd)
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack if failure on main
        uses: alphagov/govuk-infrastructure/.github/actions/report-run-failure@main
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          channel: "datagovuk-technical"
          message: "${{ github.event.workflow_run.name }} failed on main: ${{ github.event.workflow_run.html_url }}"
