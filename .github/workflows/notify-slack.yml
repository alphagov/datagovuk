on:
  push:
    branches:
      - test-DGUK-583-add-slack-notifications-cicd
  workflow_run:
    workflows:
      - Build and push multi-arch images
      - CI
      - CodeQL
      - Trivy Security Scan
      - Tag datagovuk image for staging and production
      - Create deployment PRs on release tags creation
      - Test slack notification with failure
      - Create integration PR
    types:
      - completed

jobs:
  notify-slack:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Send test Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<'JSON'
          {
            "channel": "datagovuk-technical",
            "text": "Test notification from GitHub Actions",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "Test notification from *datagovuk*.\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"'"
                }
              }
            ]
          }
          JSON
          )
          curl -sS -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"