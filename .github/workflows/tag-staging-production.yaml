name: Tag datagovuk image for staging and production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  smoke_tests:
    name: Run smoke tests on integration environment
    uses: ./.github/workflows/smoke-tests.yml
    with:
      environment: "integration"

  promote_release_tag:
    name: Promote integration image to staging and production
    needs: smoke_tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REPO: ghcr.io/alphagov/datagovuk
      INTEGRATION_VERSION_URL: https://datagovuk.eks.integration.govuk.digital/version/
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            echo "Expected workflow to run from a git tag, got ref_type=${{ github.ref_type }}"
            exit 1
          fi

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected semver tag like v1.2.3, got ${RELEASE_TAG}"
            exit 1
          fi

      - name: Get integration deployed SHA
        run: |
          set -euo pipefail

          integration_sha="$(curl -fsSL "${INTEGRATION_VERSION_URL}")"
          echo "Integration /version response: ${integration_sha}"

          if [[ ! "${integration_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Integration SHA is not a valid SHA: ${integration_sha}"
            exit 1
          fi

          echo "INTEGRATION_SHA=${integration_sha}" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image digest from integration SHA
        run: |
          set -euo pipefail

          image="${IMAGE_REPO}:sha-${INTEGRATION_SHA}"

          docker buildx imagetools inspect "${image}" > /tmp/image_inspect.txt
          digest="$(awk '/Digest:/ { print $2; exit }' /tmp/image_inspect.txt)"
          if [[ -z "${digest}" || ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Failed to resolve manifest digest for ${image}"
            cat /tmp/image_inspect.txt
            exit 1
          fi

          echo "Resolved image: ${image} and digest: ${digest}"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"
          echo "DIGEST=${digest}" >> "$GITHUB_ENV"

      - name: Create release tag from digest
        run: |
          set -euo pipefail

          target_image="${IMAGE_REPO}:${RELEASE_TAG}"

          # create a new tag pointing to the same manifest digest as the integration image
          docker buildx imagetools create -t "${target_image}" "${IMAGE_REPO}@${DIGEST}"

          docker buildx imagetools inspect "${target_image}" > /tmp/target_inspect.txt
          target_digest="$(awk '/Digest:/ { print $2; exit }' /tmp/target_inspect.txt)"

          if [[ "${target_digest}" != "${DIGEST}" ]]; then
            echo "Digest mismatch after promotion. source=${DIGEST} target=${target_digest}"
            cat /tmp/target_inspect.txt
            exit 1
          fi

          echo "Promoted ${IMAGE}@${DIGEST} to ${target_image}"
          echo "Verified target digest: ${target_digest}"
