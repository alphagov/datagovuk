name: Create deployment PRs on release tags creation

on:
  push:
    tags:
      - 'v*.*.*' # e.g. v1.2.3

permissions:
  contents: read
  packages: write

jobs:
  tag_for_staging_production:
    name: Tag datagovuk image for staging and production
    uses: ./.github/workflows/tag-staging-production.yaml
    secrets: inherit

  create_deployment_prs:
    name: Create deployment PRs
    needs: tag_for_staging_production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash ./docker/create-pr.sh
    env:
      IS_TAG: "true"
      ENVS: "staging,production"
      GH_TOKEN: ${{ secrets.PR_GITHUB_TOKEN }}
      GH_REF: ${{ github.ref_name }} # e.g. v1.2.3

  notify_slack_on_failure:
    name: Notify Slack on failure
    if: ${{ always() && (needs.create_deployment_prs.result != 'success' || needs.tag_for_staging_production.result != 'success') }}
    needs: [create_deployment_prs, tag_for_staging_production]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/notify-slack
        with:
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          channel: datagovuk-technical
          status: ${{ needs.create_deployment_prs.result }}
