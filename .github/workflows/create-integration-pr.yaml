name: Create integration charts PR

on:
  workflow_call:
    inputs:
      gitRef:
        description: commit or tag or branch to deploy
        required: false
        type: string
    secrets:
      PR_GITHUB_TOKEN:
        required: true
  workflow_dispatch:

jobs:
  create_pr:
    name: Create integration charts PR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'  }}
    steps:
      - name: Checkout datagovuk repository
        uses: actions/checkout@v6
        with:
          repository: alphagov/datagovuk
      - name: Update integration SHA
        run: bash ./docker/create-pr.sh
        env:
          GH_TOKEN: ${{ secrets.PR_GITHUB_TOKEN }}
          GH_REF: ${{ inputs.gitRef || github.event.inputs.gitRef || github.ref_name }}
          IS_TAG: "false"
          ENVS: "integration"
