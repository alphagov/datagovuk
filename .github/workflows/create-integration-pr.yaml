name: Create integration charts PR

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      gitRef:
        description: Commit, tag or branch to deploy
        required: false
        type: string
    secrets:
      PR_GITHUB_TOKEN:
        required: true

jobs:
  create_pr:
    name: Create integration charts PR
    runs-on: ubuntu-latest
    # Only run when the build workflow succeeded, not on failures
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout datagovuk repository
        uses: actions/checkout@v6
        with:
          repository: alphagov/datagovuk
