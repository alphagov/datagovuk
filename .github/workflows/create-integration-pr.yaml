name: Create integration charts PR

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      gitRef:
        description: Commit, tag or branch to deploy
        required: false
        type: string
    secrets:
      PR_GITHUB_TOKEN:
        required: true

jobs:
  create_pr:
    name: Create integration charts PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout datagovuk repository
        uses: actions/checkout@v6
        with:
          repository: alphagov/datagovuk
      - name: Update integration SHA
        run: bash ./docker/create-pr.sh
        env:
          GH_TOKEN: ${{ secrets.PR_GITHUB_TOKEN }}
          GH_REF: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          IS_TAG: "false"
          ENVS: "integration"

  notify-slack:
    if: ${{ failure() }}
    needs:
      - create_pr
    uses: ./.github/workflows/notify-slack.yml
    secrets: inherit
