services:
  django:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: python-run-dev
      args:
        GIT_SHA: $GIT_SHA
    image: datagovuk_local_django
    container_name: datagovuk_local_django
    volumes:
      - .:/app:z
      - /app/.venv
    env_file:
      - path: ./.envs/.local/.django
        required: true
      - path: ./.envs/.local/.django-overrides
        required: false
    ports:
      - '8000:8000'
    depends_on:
      - db
    command: /start

  db:
    image: postgres:17-alpine
    container_name: datagovuk_local_db
    environment:
      - POSTGRES_DB=django
      - POSTGRES_USER=django
      - POSTGRES_PASSWORD=django
    ports:
      - "5432:5432"

  playwright:
    build:
      context: ./docker/playwright
      dockerfile: ./Dockerfile
    image: datagovuk_local_playwright
    container_name: datagovuk_local_playwright
    ports:
      - '3000:3000'
