services:
  django:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: python-run-dev
    image: datagovuk_local_django
    container_name: datagovuk_local_django
    volumes:
      - .:/app:z
      - /app/.venv
    env_file:
      - path: ./.envs/.local/.django
        required: false
    ports:
      - '8000:8000'
    command: /start

  playwright:
    build:
      context: ./docker/playwright
      dockerfile: ./Dockerfile
    image: datagovuk_local_playwright
    container_name: datagovuk_local_playwright
    ports:
      - '3000:3000'
