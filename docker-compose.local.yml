services:
  django:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: python-run-dev
      args:
        GIT_SHA: $GIT_SHA
    image: datagovuk_local_django
    container_name: datagovuk_local_django
    volumes:
      - .:/app:z
      - /app/.venv
    env_file:
      - path: ./.envs/.local/.django
        required: true
      - path: ./.envs/.local/.django-overrides
        required: false
    environment:
      VITE_ENV: ${VITE_ENV:-development}
    ports:
      - '8000:8000'
    command: /start

  vite:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    image: datagovuk_local_vite
    container_name: datagovuk_local_vite
    working_dir: /app
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    environment:
      VITE_ENV: ${VITE_ENV:-development}
    ports:
      - '5173:5173'
    command: npm run dev -- --host 0.0.0.0 --strictPort --port 5173

  playwright:
    build:
      context: ./docker/playwright
      dockerfile: ./Dockerfile
    image: datagovuk_local_playwright
    container_name: datagovuk_local_playwright
    ports:
      - '3000:3000'
