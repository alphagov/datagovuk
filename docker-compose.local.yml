services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: datagovuk_local_django
    container_name: datagovuk_local_django
    volumes:
      - ./datagovuk:/app/datagovuk
      - ./config:/app/config
      - ./tests:/app/tests
      - ./e2e-failure-traces:/app/e2e-failure-traces
    env_file:
      - path: ./.envs/.local/.django
        required: false
    ports:
      - '8000:8000'
    command: /start
