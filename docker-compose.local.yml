volumes:
  datagovuk_local_postgres_data: {}
  datagovuk_local_postgres_data_backups: {}


services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: datagovuk_local_django
    container_name: datagovuk_local_django
    #depends_on:
    #  - postgres
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - path: ./.envs/.local/.django
        required: false
      - path: ./.envs/.local/.postgres
        required: false
    ports:
      - '8000:8000'
    command: /start

