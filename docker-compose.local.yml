services:
  django:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: python-run-dev
      args:
        GIT_SHA: $GIT_SHA
    image: datagovuk_local_django
    container_name: datagovuk_local_django
    volumes:
      - .:/app:z
      - /app/.venv
    env_file:
      - path: ./.envs/.local/.django
        required: true
      - path: ./.envs/.local/.django-overrides
        required: false
    ports:
      - '8000:8000'
    command: /start
    networks:
      - ckan-2.10

  playwright:
    build:
      context: ./docker/playwright
      dockerfile: ./Dockerfile
    image: datagovuk_local_playwright
    container_name: datagovuk_local_playwright
    ports:
      - '3000:3000'
    networks:
      - ckan-2.10

networks:
  ckan-2.10:
      driver: bridge
      external: true
      name: docker_ckan-2.10
