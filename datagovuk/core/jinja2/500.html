{% extends "base.jinja" %}

{% set page_title = "Sorry, there is a problem with the service" %}

{% block main %}
  <div class="govuk-width-container datagovuk-width-container">
    <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">
          <h1 class="govuk-heading-l datagovuk-heading-l">Sorry, there is a problem with the service</h1>
          <p class="govuk-body datagovuk-body">
            Try again later.
          </p>
          <p class="govuk-body datagovuk-body">
            If the issue persists, please use the <a class="govuk-link datagovuk-link datagovuk-link--secondary" href="https://www.gov.uk/contact/govuk">GOV.UK support form</a> and mention that it's about data.gov.uk.
          </p>
        </div>
    <div>
  </div>
{% endblock main %}
